# Devnet0 environment configuration
environment: devnet0

chain:
  grpc_endpoint: "devnet.injective.dev:9900"
  grpc_exchange_endpoint: "devnet.injective.dev:9910"
  grpc_explorer_endpoint: "devnet.injective.dev:9911"
  chain_stream_endpoint: "devnet.injective.dev:9999"
  lcd_endpoint: "https://devnet.lcd.injective.dev"
  chain_id: "injective-777"
  tx_timeout_seconds: 10

# RFQ Indexer API - New bidirectional WebSocket streams
# Options:
#   1. HTTP/gRPC-web: Create via http_endpoint, stream via grpc_web_endpoint
#   2. WebSocket bidirectional: MakerStream (MM) / TakerStream (Retail)
# 
# WebSocket streams require ping every 2 seconds to keep alive
indexer:
  # WebSocket base for bidirectional streams (append /MakerStream or /TakerStream)
  ws_endpoint: "wss://devnet.api.injective.dev/injective_rfqrpc.InjectiveRFQRPC"
  # HTTP/REST API
  http_endpoint: "https://devnet.api.injective.dev/api/rfq/v1"
  # gRPC-web endpoint (same as ws but over HTTPS)
  grpc_web_endpoint: "https://devnet.api.injective.dev/injective_rfqrpc.InjectiveRFQRPC"

contract:
  address: "inj19g43wyj843ydkc845dcdea6su4mgfjwnpjz6h5"

markets:
