# Devnet3 environment configuration
environment: devnet3

chain:
  grpc_endpoint: "devnet3-grpc.injective.dev:443"
  lcd_endpoint: "https://devnet3-lcd.injective.dev"
  chain_id: "injective-777"
  tx_timeout_seconds: 10

indexer:
  ws_endpoint: "wss://devnet3-rfq-indexer.injective.dev/ws"
  http_endpoint: "https://devnet3-rfq-indexer.injective.dev"

contract:
  address: "inj19g43wyj843ydkc845dcdea6su4mgfjwnpjz6h5"  # RFQ contract on devnet3

# Prices fetched from oracle
markets:
  - id: ""  # Fill with devnet3 INJ/USDT market ID
    symbol: "INJ/USDT"
    base: "INJ"
    quote: "USDT"
    price_source: "oracle"
    min_quantity: 1.0

  - id: ""  # Fill with devnet3 BTC/USDT market ID
    symbol: "BTC/USDT"
    base: "BTC"
    quote: "USDT"
    price_source: "oracle"
    min_quantity: 0.001

  - id: ""  # Fill with devnet3 ETH/USDT market ID
    symbol: "ETH/USDT"
    base: "ETH"
    quote: "USDT"
    price_source: "oracle"
    min_quantity: 0.01

faucet:
  enabled: true
  url: "https://devnet3-faucet.injective.dev"
  rate_limit_seconds: 60
