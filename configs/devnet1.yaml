# Devnet1 environment configuration
environment: devnet1

chain:
  grpc_endpoint: "devnet1-grpc.injective.dev:443"
  lcd_endpoint: "https://devnet1-lcd.injective.dev"
  chain_id: "injective-777"
  tx_timeout_seconds: 10

indexer:
  ws_endpoint: "wss://devnet1-rfq-indexer.injective.dev/ws"
  http_endpoint: "https://devnet1-rfq-indexer.injective.dev"

contract:
  address: ""  # Fill with devnet1 contract address

# Prices fetched from oracle
markets:
  - id: ""  # Fill with devnet1 INJ/USDT market ID
    symbol: "INJ/USDT"
    base: "INJ"
    quote: "USDT"
    price_source: "oracle"
    min_quantity: 1.0

  - id: ""  # Fill with devnet1 BTC/USDT market ID
    symbol: "BTC/USDT"
    base: "BTC"
    quote: "USDT"
    price_source: "oracle"
    min_quantity: 0.001

  - id: ""  # Fill with devnet1 ETH/USDT market ID
    symbol: "ETH/USDT"
    base: "ETH"
    quote: "USDT"
    price_source: "oracle"
    min_quantity: 0.01

faucet:
  enabled: true
  url: "https://devnet1-faucet.injective.dev"
  rate_limit_seconds: 60
